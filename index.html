<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Duelo de Equipos</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0f0f0f;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            padding: 20px;
        }

        /* Pantalla de conexión */
        .conexion-container {
            text-align: center;
            width: 100%;
            max-width: 480px;
        }

        .conexion-container h2 {
            font-size: 2rem;
            font-weight: 800;
            color: #fff;
            letter-spacing: -0.03em;
            margin-bottom: 8px;
        }

        .conexion-container .subtitle {
            color: #666;
            font-size: 0.9rem;
            margin-bottom: 32px;
        }

        .card {
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 16px;
        }

        .card-label {
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #555;
            margin-bottom: 12px;
        }

        .mi-id {
            font-size: 1.6rem;
            font-weight: 800;
            color: #fff;
            letter-spacing: 0.05em;
            font-variant-numeric: tabular-nums;
            user-select: all;
        }

        .mi-id.loading {
            color: #333;
            animation: pulse 1.2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        .btn-copiar {
            margin-top: 12px;
            background: #2a2a2a;
            color: #888;
            border: 1px solid #333;
            padding: 8px 18px;
            font-size: 0.8rem;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.15s;
        }

        .btn-copiar:hover { background: #333; color: #ccc; }
        .btn-copiar.copiado { background: #1a3a1a; color: #4ade80; border-color: #2d5a2d; }

        .divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 8px 0;
            color: #333;
            font-size: 0.8rem;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #2a2a2a;
        }

        .input-rival {
            width: 100%;
            padding: 14px 16px;
            font-size: 1.2rem;
            font-weight: 700;
            text-align: center;
            letter-spacing: 0.1em;
            background: #111;
            border: 2px solid #2a2a2a;
            border-radius: 12px;
            color: #fff;
            outline: none;
            transition: border-color 0.15s;
            margin-bottom: 12px;
        }

        .input-rival:focus { border-color: #444; }
        .input-rival::placeholder { color: #333; font-weight: 400; letter-spacing: 0; }

        .btn-conectar {
            width: 100%;
            background: #fff;
            color: #000;
            border: none;
            padding: 14px;
            font-size: 1rem;
            font-weight: 700;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.15s;
            letter-spacing: -0.01em;
        }

        .btn-conectar:hover { background: #e5e5e5; }
        .btn-conectar:active { transform: scale(0.98); }
        .btn-conectar:disabled { background: #333; color: #555; cursor: not-allowed; transform: none; }

        .estado {
            margin-top: 16px;
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 0.85rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .estado::before {
            content: '';
            width: 8px;
            height: 8px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .estado.esperando {
            background: #1a1500;
            color: #888;
            border: 1px solid #2a2000;
        }
        .estado.esperando::before { background: #444; }

        .estado.conectando {
            background: #1a1200;
            color: #f59e0b;
            border: 1px solid #3a2800;
        }
        .estado.conectando::before { background: #f59e0b; animation: pulse 0.8s ease-in-out infinite; }

        .estado.conectado {
            background: #001a08;
            color: #4ade80;
            border: 1px solid #002a10;
        }
        .estado.conectado::before { background: #4ade80; }

        .estado.error {
            background: #1a0000;
            color: #f87171;
            border: 1px solid #2a0000;
        }
        .estado.error::before { background: #f87171; }

        /* Pantalla de selección */
        .seleccion-container {
            text-align: center;
            width: 100%;
            max-width: 500px;
        }

        .seleccion-container h2 {
            font-size: 1.6rem;
            font-weight: 800;
            color: #fff;
            letter-spacing: -0.03em;
            margin-bottom: 8px;
        }

        .seleccion-container .subtitle {
            color: #555;
            font-size: 0.9rem;
            margin-bottom: 40px;
        }

        .botones-equipo {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn-equipo {
            border: none;
            color: white;
            font-size: 1.1rem;
            font-weight: 800;
            width: 190px;
            height: 190px;
            border-radius: 50%;
            cursor: pointer;
            transition: transform 0.08s, box-shadow 0.08s;
            display: flex;
            align-items: center;
            justify-content: center;
            -webkit-tap-highlight-color: transparent;
            letter-spacing: -0.02em;
        }

        .btn-equipo:active {
            transform: translateY(5px);
        }

        .btn-funcionales {
            background: #1e6fdf;
            box-shadow: 0 8px 0 #0a3a7a, 0 12px 24px rgba(30,111,223,0.3);
        }
        .btn-funcionales:active { box-shadow: 0 3px 0 #0a3a7a, 0 6px 12px rgba(30,111,223,0.2); }

        .btn-tecnicos {
            background: #dc2626;
            box-shadow: 0 8px 0 #7f1d1d, 0 12px 24px rgba(220,38,38,0.3);
        }
        .btn-tecnicos:active { box-shadow: 0 3px 0 #7f1d1d, 0 6px 12px rgba(220,38,38,0.2); }

        .btn-equipo:disabled {
            opacity: 0.4;
            transform: none;
            cursor: default;
        }
        .btn-equipo:disabled:active {
            transform: none;
            box-shadow: 0 8px 0 #0a3a7a;
        }

        .esperando-rival {
            margin-top: 32px;
            color: #555;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .spinner {
            width: 16px;
            height: 16px;
            border: 2px solid #333;
            border-top-color: #666;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* Pantalla principal */
        .boton-container {
            display: none;
            text-align: center;
            width: 100%;
            max-width: 360px;
        }

        .btn-redondo {
            border: none;
            color: white;
            font-size: 1.8rem;
            font-weight: 900;
            width: 280px;
            height: 280px;
            border-radius: 50%;
            cursor: pointer;
            transition: transform 0.08s, box-shadow 0.08s, opacity 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            -webkit-tap-highlight-color: transparent;
            margin: 0 auto;
            letter-spacing: -0.02em;
            position: relative;
            overflow: hidden;
        }

        .btn-redondo::after {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 50%;
            background: rgba(255,255,255,0.1);
            opacity: 0;
            transition: opacity 0.1s;
        }

        .btn-redondo:active::after { opacity: 1; }

        .btn-redondo:active {
            transform: translateY(5px);
        }

        .btn-redondo.funcionales {
            background: #1e6fdf;
            box-shadow: 0 8px 0 #0a3a7a, 0 16px 40px rgba(30,111,223,0.35);
        }
        .btn-redondo.funcionales:active { box-shadow: 0 3px 0 #0a3a7a, 0 8px 20px rgba(30,111,223,0.25); }

        .btn-redondo.tecnicos {
            background: #dc2626;
            box-shadow: 0 8px 0 #7f1d1d, 0 16px 40px rgba(220,38,38,0.35);
        }
        .btn-redondo.tecnicos:active { box-shadow: 0 3px 0 #7f1d1d, 0 8px 20px rgba(220,38,38,0.25); }

        .btn-redondo:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none !important;
        }
        .btn-redondo:disabled::after { display: none; }

        .equipo-elegido {
            margin-top: 24px;
            font-size: 0.85rem;
            color: #555;
            font-weight: 500;
        }

        .resultado {
            margin-top: 24px;
            padding: 16px 28px;
            font-size: 1.4rem;
            font-weight: 800;
            border-radius: 50px;
            display: inline-block;
            letter-spacing: -0.02em;
        }

        .resultado.funcionales-win {
            background: #0a1a3a;
            color: #60a5fa;
            border: 2px solid #1e3a6e;
        }

        .resultado.tecnicos-win {
            background: #1a0a0a;
            color: #f87171;
            border: 2px solid #5a1a1a;
        }

        .reset-btn {
            margin-top: 20px;
            background: transparent;
            color: #444;
            border: 1px solid #2a2a2a;
            padding: 12px 28px;
            font-size: 0.85rem;
            font-weight: 600;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.15s;
            letter-spacing: 0.02em;
        }

        .reset-btn:hover { background: #1a1a1a; color: #888; border-color: #444; }

        @media (max-width: 480px) {
            .btn-equipo { width: 150px; height: 150px; font-size: 0.95rem; }
            .btn-redondo { width: 240px; height: 240px; font-size: 1.5rem; }
            .mi-id { font-size: 1.3rem; }
        }
    </style>

    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
</head>
<body>

    <div id="conexionContainer" class="conexion-container">
        <h2>Duelo de Equipos</h2>
        <p class="subtitle">Conecta con tu rival para empezar</p>

        <div class="card">
            <div class="card-label">Tu código</div>
            <div id="miId" class="mi-id loading">● ● ● ●</div>
            <button class="btn-copiar" id="btnCopiar">Copiar código</button>
        </div>

        <div class="divider">o conéctate tú</div>

        <div class="card">
            <div class="card-label">Código del rival</div>
            <input type="text" id="codigoRival" class="input-rival" placeholder="Ingresa el código" autocomplete="off">
            <button id="btnConectar" class="btn-conectar">Conectar →</button>
        </div>

        <div id="estadoConexion" class="estado esperando">Esperando conexión...</div>
    </div>

    <div id="seleccion" class="seleccion-container" style="display:none;">
        <h2>Elige tu equipo</h2>
        <p class="subtitle">¡Elige y prepárate para pulsar!</p>
        <div class="botones-equipo">
            <button class="btn-equipo btn-funcionales" data-equipo="funcionales">Funcionales</button>
            <button class="btn-equipo btn-tecnicos" data-equipo="tecnicos">Técnicos</button>
        </div>
        <div id="esperandoRivalTexto" style="display:none;" class="esperando-rival">
            <div class="spinner"></div>
            Esperando que el rival elija...
        </div>
    </div>

    <div id="botonContainer" class="boton-container">
        <button id="botonPrincipal" class="btn-redondo">PULSA</button>
        <div id="equipoTexto" class="equipo-elegido"></div>
        <div id="resultado" style="display:none;"></div>
        <button id="resetBtn" class="reset-btn">↺ Nueva Ronda</button>
    </div>

    <script>
        // Variables globales
        let peer = null;
        let connection = null;
        let equipoActual = null;
        let ganador = null;              // equipo ganador definitivo
        let rivalListo = false;
        let yoListo = false;
        let tieneConexion = false;
        let intentoLocal = null;         // { equipo, timestamp }

        // DOM elements
        const conexionDiv       = document.getElementById('conexionContainer');
        const seleccionDiv      = document.getElementById('seleccion');
        const botonContainer    = document.getElementById('botonContainer');
        const miIdSpan          = document.getElementById('miId');
        const codigoRivalInput  = document.getElementById('codigoRival');
        const btnConectar       = document.getElementById('btnConectar');
        const estadoConexionDiv = document.getElementById('estadoConexion');
        const botonPrincipal    = document.getElementById('botonPrincipal');
        const equipoTexto       = document.getElementById('equipoTexto');
        const resultadoDiv      = document.getElementById('resultado');
        const resetBtn          = document.getElementById('resetBtn');
        const esperandoRival    = document.getElementById('esperandoRivalTexto');
        const botonesEquipo     = document.querySelectorAll('.btn-equipo');

        // Sonidos (opcionales)
        const sonidos = {
            funcionales: 'sound2.mp3',
            tecnicos: 'sound.mp3'
        };
        function reproducirSonido(equipo) {
            const ruta = sonidos[equipo];
            if (!ruta) return;
            new Audio(ruta).play().catch(() => {});
        }

        // Reinicio completo a pantalla de conexión
        function resetearTodo() {
            if (connection) {
                try { connection.close(); } catch(e) {}
                connection = null;
            }
            tieneConexion = false;
            equipoActual = null;
            ganador = null;
            rivalListo = false;
            yoListo = false;
            intentoLocal = null;

            seleccionDiv.style.display = 'none';
            botonContainer.style.display = 'none';
            conexionDiv.style.display = 'block';

            codigoRivalInput.value = '';
            codigoRivalInput.disabled = false;
            btnConectar.disabled = false;
            estadoConexionDiv.className = 'estado esperando';
            estadoConexionDiv.textContent = 'Esperando conexión...';

            botonesEquipo.forEach(btn => {
                btn.disabled = false;
                btn.style.opacity = '';
                btn.style.cursor = '';
            });
            esperandoRival.style.display = 'none';

            resultadoDiv.style.display = 'none';
            botonPrincipal.disabled = false;
            botonPrincipal.classList.remove('funcionales', 'tecnicos');
            equipoTexto.textContent = '';
        }

        // Actualizar UI según ganador
        function actualizarUI() {
            if (ganador) {
                const nombre = ganador === 'funcionales' ? 'Funcionales' : 'Técnicos';
                resultadoDiv.textContent = `¡${nombre}!`;
                resultadoDiv.className = `resultado ${ganador}-win`;
                resultadoDiv.style.display = 'inline-block';
                botonPrincipal.disabled = true;
            } else {
                resultadoDiv.style.display = 'none';
                botonPrincipal.disabled = false;
            }
        }

        // Declarar ganador definitivo (después de resolver conflictos)
        function declararGanador(equipo) {
            if (ganador) return;
            ganador = equipo;
            reproducirSonido(ganador);
            actualizarUI();
        }

        // Enviar mensaje de intento (al pulsar)
        function enviarIntento() {
            if (!connection || !connection.open) return false;
            if (ganador) return false;
            if (intentoLocal) return false; // ya se intentó

            const now = Date.now();
            intentoLocal = { equipo: equipoActual, timestamp: now };
            connection.send({
                type: 'INTENTO',
                equipo: equipoActual,
                timestamp: now
            });
            // Deshabilitamos el botón para evitar doble clic
            botonPrincipal.disabled = true;
            return true;
        }

        // Procesar mensajes entrantes
        function procesarMensaje(data) {
            if (data.type === 'INTENTO') {
                // Recibimos un intento del rival
                const rivalIntento = { equipo: data.equipo, timestamp: data.timestamp };

                if (ganador) {
                    // Ya hay ganador, solo informamos al rival (no debería pasar, pero por si acaso)
                    if (connection && connection.open) {
                        connection.send({ type: 'GANADOR', equipo: ganador });
                    }
                    return;
                }

                if (!intentoLocal) {
                    // Nosotros no hemos pulsado aún → el rival gana automáticamente
                    declararGanador(rivalIntento.equipo);
                    if (connection && connection.open) {
                        connection.send({ type: 'GANADOR', equipo: rivalIntento.equipo });
                    }
                } else {
                    // Ambos pulsaron, resolver por timestamp
                    let ganadorEquipo;
                    if (intentoLocal.timestamp < rivalIntento.timestamp) {
                        ganadorEquipo = intentoLocal.equipo;
                    } else if (intentoLocal.timestamp > rivalIntento.timestamp) {
                        ganadorEquipo = rivalIntento.equipo;
                    } else {
                        // Empate de timestamp (raro), desempatar por orden alfabético de equipo
                        ganadorEquipo = intentoLocal.equipo < rivalIntento.equipo ? intentoLocal.equipo : rivalIntento.equipo;
                    }
                    declararGanador(ganadorEquipo);
                    if (connection && connection.open) {
                        connection.send({ type: 'GANADOR', equipo: ganadorEquipo });
                    }
                }
            }
            else if (data.type === 'GANADOR') {
                // Confirmación definitiva de ganador
                if (!ganador) {
                    declararGanador(data.equipo);
                }
            }
            else if (data.type === 'RESET') {
                ganador = null;
                intentoLocal = null;
                actualizarUI();
                botonPrincipal.disabled = false;
            }
            else if (data.type === 'EQUIPO_LISTO') {
                rivalListo = true;
                verificarAmbosListos();
            }
        }

        // Verificar si ambos eligieron equipo
        function verificarAmbosListos() {
            if (yoListo && rivalListo) {
                seleccionDiv.style.display = 'none';
                botonContainer.style.display = 'block';
                equipoTexto.textContent = `Equipo: ${equipoActual === 'funcionales' ? 'Funcionales' : 'Técnicos'}`;
                esperandoRival.style.display = 'none';
            }
        }

        // Configurar conexión entrante o saliente
        function configurarConexion(conn) {
            if (tieneConexion && connection !== conn) {
                try { conn.close(); } catch(e) {}
                return;
            }
            connection = conn;
            tieneConexion = true;

            conn.on('open', () => {
                setEstado('conectado', '¡Conectado! Elige tu equipo');
                conexionDiv.style.display = 'none';
                seleccionDiv.style.display = 'block';
                // Resetear estado de juego
                rivalListo = false;
                yoListo = false;
                ganador = null;
                intentoLocal = null;
                actualizarUI();
                botonesEquipo.forEach(btn => {
                    btn.disabled = false;
                    btn.style.opacity = '';
                });
                esperandoRival.style.display = 'none';
                equipoActual = null;
                botonPrincipal.classList.remove('funcionales', 'tecnicos');
                equipoTexto.textContent = '';
            });

            conn.on('data', procesarMensaje);

            conn.on('close', () => {
                setEstado('error', 'Conexión perdida. Vuelve a conectar.');
                resetearTodo();
            });

            conn.on('error', (err) => {
                console.error('Error en conexión:', err);
                setEstado('error', 'Error en la conexión');
                resetearTodo();
            });
        }

        function setEstado(tipo, texto) {
            estadoConexionDiv.className = `estado ${tipo}`;
            estadoConexionDiv.textContent = texto;
        }

        // Inicializar PeerJS
        peer = new Peer(undefined, {
            config: {
                iceServers: [
                    { urls: 'stun:stun.l.google.com:19302' },
                    { urls: 'stun:stun1.l.google.com:19302' },
                    { urls: 'stun:stun2.l.google.com:19302' },
                    { urls: 'turn:openrelay.metered.ca:80', username: 'openrelayproject', credential: 'openrelayproject' },
                    { urls: 'turn:openrelay.metered.ca:443', username: 'openrelayproject', credential: 'openrelayproject' },
                    { urls: 'turn:openrelay.metered.ca:443?transport=tcp', username: 'openrelayproject', credential: 'openrelayproject' }
                ]
            }
        });

        peer.on('open', (id) => {
            miIdSpan.textContent = id;
            miIdSpan.classList.remove('loading');
            setEstado('esperando', 'Esperando conexión...');
            btnConectar.disabled = false;
        });

        peer.on('error', (err) => {
            console.error('Peer error:', err);
            setEstado('error', 'Error: ' + (err.type || 'desconocido'));
            btnConectar.disabled = false;
        });

        peer.on('connection', (conn) => {
            if (tieneConexion) {
                try { conn.close(); } catch(e) {}
                return;
            }
            setEstado('conectando', 'Rival conectándose...');
            configurarConexion(conn);
        });

        // Botón conectar
        btnConectar.addEventListener('click', () => {
            if (tieneConexion) {
                setEstado('error', 'Ya hay una conexión activa.');
                return;
            }
            const rivalId = codigoRivalInput.value.trim();
            if (!rivalId) {
                codigoRivalInput.focus();
                return;
            }
            btnConectar.disabled = true;
            setEstado('conectando', 'Conectando...');
            const conn = peer.connect(rivalId, { reliable: true });
            configurarConexion(conn);

            setTimeout(() => {
                if (!conn.open && !tieneConexion) {
                    setEstado('error', 'No se pudo conectar. Verifica el código.');
                    btnConectar.disabled = false;
                    try { conn.close(); } catch(e) {}
                }
            }, 10000);
        });

        codigoRivalInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !tieneConexion) btnConectar.click();
        });

        // Selección de equipo
        botonesEquipo.forEach(btn => {
            btn.addEventListener('click', () => {
                if (yoListo || !connection || !connection.open) return;
                equipoActual = btn.getAttribute('data-equipo');
                yoListo = true;

                botonPrincipal.classList.remove('funcionales', 'tecnicos');
                botonPrincipal.classList.add(equipoActual);
                botonesEquipo.forEach(b => { b.disabled = true; b.style.opacity = '0.5'; });
                esperandoRival.style.display = 'flex';

                if (connection && connection.open) {
                    connection.send({ type: 'EQUIPO_LISTO' });
                }
                verificarAmbosListos();
            });
        });

        // Botón principal: envía intento de ganar
        botonPrincipal.addEventListener('click', () => {
            if (!equipoActual || ganador) return;
            if (intentoLocal) return; // ya se intentó
            enviarIntento();
        });

        // Reset de ronda
        resetBtn.addEventListener('click', () => {
            if (!connection || !connection.open) return;
            ganador = null;
            intentoLocal = null;
            actualizarUI();
            connection.send({ type: 'RESET' });
        });

        // Copiar ID
        document.getElementById('btnCopiar').addEventListener('click', () => {
            const id = miIdSpan.textContent;
            if (!id || id === '● ● ● ●') return;
            navigator.clipboard.writeText(id).then(() => {
                const btn = document.getElementById('btnCopiar');
                btn.textContent = '✓ Copiado';
                btn.classList.add('copiado');
                setTimeout(() => {
                    btn.textContent = 'Copiar código';
                    btn.classList.remove('copiado');
                }, 2000);
            }).catch(() => {});
        });

        btnConectar.disabled = true;
    </script>
</body>
</html>
